name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (complete history for and commit count)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare website and generate version.json
        run: |
          # Versione = base dell'ultimo tag + numero di commit fatti DA quel tag.
          # Es: tag v1.0.0, 3 commit dopo -> v1.0.3. Sul commit del tag stesso -> v1.0.0.
          if LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null); then
            COMMITS_SINCE=$(git rev-list "${LATEST_TAG}..HEAD" --count)
            BASE="${LATEST_TAG%.*}"
            VERSION="${BASE}.${COMMITS_SINCE}"
          else
            VERSION="v0.1.$(git rev-list --count HEAD)"
          fi
          DATE=$(git log -1 --format=%cd --date=format:'%Y-%m-%d')
          COMMIT=$(git rev-parse --short HEAD)
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' ./ _site/
          cat > _site/version.json <<EOF
          {
            "version": "$VERSION",
            "date": "$DATE",
            "commit": "$COMMIT"
          }
          EOF
          echo "version.json generato:"; cat _site/version.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Load artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy on Pages
        id: deployment
        uses: actions/deploy-pages@v4
